apiVersion: apps/v1
kind: Deployment
metadata:
  name: cici-ears
  namespace: ai-ml
  labels:
    app: cici-ears
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cici-ears
  template:
    metadata:
      labels:
        app: cici-ears
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9766"
        prometheus.io/path: "/metrics"
    spec:
      runtimeClassName: nvidia
      containers:
      - name: cici-ears
        image: 192.168.50.2:5050/ai-ml/cici/ears:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8766
          name: websocket
        - containerPort: 9766
          name: metrics
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
            nvidia.com/gpu: "1"
          limits:
            cpu: "1"
            memory: 2Gi
            nvidia.com/gpu: "1"
        env:
        - name: NVIDIA_VISIBLE_DEVICES
          valueFrom:
            configMapKeyRef:
              name: gpu-devices
              key: RTX3060_UUID
        - name: EARS_HOST
          value: "0.0.0.0"
        - name: EARS_PORT
          value: "8766"
        - name: SAMPLE_RATE
          valueFrom:
            configMapKeyRef:
              name: cici-config-dev
              key: CICI_SAMPLE_RATE
        - name: EARS_SILENCE_DURATION_MS
          valueFrom:
            configMapKeyRef:
              name: cici-config-dev
              key: CICI_EARS_SILENCE_MS
        - name: EARS_DEBUG
          valueFrom:
            configMapKeyRef:
              name: cici-config-dev
              key: CICI_EARS_DEBUG
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: cici-config-dev
              key: CICI_LOG_LEVEL
      imagePullSecrets:
      - name: gitlab-registry
