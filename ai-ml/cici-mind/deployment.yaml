apiVersion: apps/v1
kind: Deployment
metadata:
  name: cici-mind
  namespace: ai-ml
  labels:
    app: cici-mind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cici-mind
  template:
    metadata:
      labels:
        app: cici-mind
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8765"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: cici-mind
        image: 192.168.50.2:5050/ai-ml/cici/mind:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8765
        envFrom:
        - configMapRef:
            name: cici-config
        env:
        - name: MIND_HOST
          value: "0.0.0.0"
        volumeMounts:
        - name: infra
          mountPath: /infra
        - name: claude-config
          mountPath: /home/x81k25/.claude
          readOnly: true
        - name: claude-json
          mountPath: /home/x81k25/.claude.json
          readOnly: true
        - name: home-cache
          mountPath: /home/x81k25/.cache
      volumes:
      - name: infra
        hostPath:
          path: /infra
          type: Directory
      - name: claude-config
        hostPath:
          path: /home/x81k25/.claude
          type: Directory
      - name: claude-json
        hostPath:
          path: /home/x81k25/.claude.json
          type: File
      - name: home-cache
        emptyDir: {}
      imagePullSecrets:
      - name: gitlab-registry
