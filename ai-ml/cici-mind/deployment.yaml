apiVersion: apps/v1
kind: Deployment
metadata:
  name: cici-mind
  namespace: ai-ml
  labels:
    app: cici-mind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cici-mind
  template:
    metadata:
      labels:
        app: cici-mind
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8765"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: cici-mind
        image: 192.168.50.2:5050/ai-ml/cici/mind:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8765
        env:
        - name: HOME
          value: "/home/x81k25"
        - name: MIND_HOST
          value: "0.0.0.0"
        - name: MIND_PORT
          value: "8765"
        - name: LOCAL_LLM_HOST
          valueFrom:
            configMapKeyRef:
              name: cici-config-dev
              key: CICI_LOCAL_LLM_HOST
        - name: LOCAL_LLM_PORT
          valueFrom:
            configMapKeyRef:
              name: cici-config-dev
              key: CICI_LOCAL_LLM_PORT
        - name: LOCAL_LLM_MODEL
          valueFrom:
            configMapKeyRef:
              name: cici-config-dev
              key: CICI_LOCAL_LLM_MODEL
        - name: MOUTH_HOST
          valueFrom:
            configMapKeyRef:
              name: cici-config-dev
              key: CICI_MOUTH_HOST_INTERNAL
        - name: MOUTH_PORT
          valueFrom:
            configMapKeyRef:
              name: cici-config-dev
              key: CICI_MOUTH_PORT_INTERNAL
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: cici-config-dev
              key: CICI_LOG_LEVEL
        - name: DEFAULT_CWD
          value: "/infra"
        volumeMounts:
        - name: infra
          mountPath: /infra
        - name: claude-config
          mountPath: /home/x81k25/.claude
          readOnly: true
      volumes:
      - name: infra
        hostPath:
          path: /infra
          type: Directory
      - name: claude-config
        hostPath:
          path: /home/x81k25/.claude
          type: Directory
      imagePullSecrets:
      - name: gitlab-registry
