apiVersion: apps/v1
kind: Deployment
metadata:
  name: cici-mouth
  namespace: ai-ml
  labels:
    app: cici-mouth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cici-mouth
  template:
    metadata:
      labels:
        app: cici-mouth
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      runtimeClassName: nvidia
      containers:
      - name: cici-mouth
        image: 192.168.50.2:5050/ai-ml/cici/mouth:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
            nvidia.com/gpu: "1"
          limits:
            cpu: "1"
            memory: 1Gi
            nvidia.com/gpu: "1"
        envFrom:
        - configMapRef:
            name: cici-config
        env:
        - name: MOUTH_HOST
          value: "0.0.0.0"
        volumeMounts:
        - name: fish-speech-model
          mountPath: /models/fish-speech-1.5
          readOnly: true
      volumes:
      - name: fish-speech-model
        hostPath:
          path: /opt/models/fish-speech-1.5
          type: DirectoryOrCreate
      imagePullSecrets:
      - name: gitlab-registry
