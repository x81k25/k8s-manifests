# Traefik ingress + AdGuard DNS (danile.x81 / danile-api.x81 → cluster host).
# DNS names are registered in terraform (adguard_config.dns_domains_single).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: danile-ui
spec:
  ingressClassName: traefik
  rules:
  - host: danile.x81
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: danile
            port:
              number: 8501
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: danile-api
spec:
  ingressClassName: traefik
  rules:
  - host: danile-api.x81
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: danile
            port:
              number: 8000
