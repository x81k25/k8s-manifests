apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hue
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: experiments-hue-strip-api@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: hue.x81
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: hue
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hue
                port:
                  number: 8501
