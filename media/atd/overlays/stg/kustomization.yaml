apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
nameSuffix: -stg
commonLabels:
  variant: stg
patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: atd
    spec:
      template:
        spec:
          containers:
          - name: gluetun
            image: 192.168.50.2:5050/media/atd/vpn:stg
          - name: transmission
            image: 192.168.50.2:5050/media/atd/atd:stg
            volumeMounts:
            - name: complete-volume
              mountPath: /downloads/complete
            - name: incomplete-volume
              mountPath: /downloads/incomplete
          volumes:
          - name: complete-volume
            hostPath:
              path: /d/media-cache/stg/complete
          - name: incomplete-volume
            hostPath:
              path: /d/media-cache/stg/incomplete
- target:
    version: v1
    kind: Service
    name: atd
  patch: |-
    - op: replace
      path: /spec/ports/0/port
      value: 9092
    - op: replace
      path: /spec/ports/0/nodePort
      value: 30091
- target:
    group: networking.k8s.io
    version: v1
    kind: Ingress
    name: transmission-ingress
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: transmission.stg.lab
    - op: replace
      path: /spec/rules/0/http/paths/0/backend/service/port/number
      value: 9092