apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "32400"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: plex
          image: plexinc/pms-docker:latest
          env:
            - name: TZ
              value: "America/Chicago"
            - name: PLEX_CLAIM
              valueFrom:
                secretKeyRef:
                  name: plex-config
                  key: PLEX_CLAIM
            - name: PLEX_UID
              value: "1005"
            - name: PLEX_GID
              value: "1001"
          volumeMounts:
            - mountPath: /config
              name: plex-config
            - mountPath: /transcode
              name: plex-transcode
            - mountPath: /data
              name: plex-media
      # plex-media volume is declared per-overlay (hostPath in dev, PVC in prod)
      # because strategic merge cannot cleanly switch a volume's source type.
      volumes:
        - name: plex-config
          hostPath:
            path: /d/k8s/volumes/plex/config
        - name: plex-transcode
          hostPath:
            path: /d/k8s/volumes/plex/transcode