# plex/overlays/prod/pvc.yaml
# Bind to static local PV media-library-prod-plex declared in
# terraform/modules/media/main.tf. Renders as media-library-plex-prod
# in media-prod namespace via nameSuffix.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-library-plex
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  resources:
    requests:
      storage: 14Ti
  volumeName: media-library-prod-plex
