# rear-diff/overlays/prod/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- pvc.yaml
namespace: media-prod
nameSuffix: -prod
commonLabels:
  variant: prod

images:
- name: 192.168.50.2:5050/media/rear-differential
  newTag: main

patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: rear-diff
    spec:
      template:
        spec:
          containers:
          - name: rear-diff-api
            volumeMounts:
            - name: media-cache
              mountPath: /d/media-cache/prod
            - name: media-library
              mountPath: /k/media/video
              subPath: video
          volumes:
          - name: media-cache
            persistentVolumeClaim:
              claimName: media-cache
          - name: media-library
            persistentVolumeClaim:
              claimName: media-library
- target:
    version: v1
    kind: Service
    name: rear-diff
  patch: |-
    - op: replace
      path: /spec/ports/0/nodePort
      value: 30810