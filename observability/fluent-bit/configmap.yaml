apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: observability
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            docker
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On

    # host crontab job logs written by cron-wrap.sh (/var/log is already
    # mounted from the host). one file per job; the job name also rides on
    # each line as `cronjob=<name>` for per-job filtering + alert labeling.
    [INPUT]
        Name              tail
        Path              /var/log/cron-jobs/*.log
        Tag               cron.*
        Refresh_Interval  5
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        # cron logs are low-frequency: read the whole file (not just post-startup
        # appends, which tail-from-end would miss) and track the offset in a
        # persistent DB so restarts don't re-ingest already-shipped lines.
        Read_from_Head    On
        # inotify IN_MODIFY events from host-side writes don't reach fluent-bit
        # for these bind-mounted files (unlike the kube logs it watches via the
        # separate docker-containers mount), so appends were never read. poll via
        # stat on Refresh_Interval instead, which reliably catches size growth.
        Inotify_Watcher   Off

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        
    [FILTER]
        Name                grep
        Match               kube.*
        Exclude             kubernetes_pod_phase Succeeded
        
    [OUTPUT]
        Name                loki
        Match               kube.*
        Host                loki.observability.svc.cluster.local
        Port                3100
        Labels              job=fluentbit
        Auto_Kubernetes_Labels on

    # host cron logs → Loki under a fixed job=cron stream (no kubernetes
    # metadata to auto-label; these are host files, not pod logs)
    [OUTPUT]
        Name                loki
        Match               cron.*
        Host                loki.observability.svc.cluster.local
        Port                3100
        Labels              job=cron

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ