apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: observability
data:
  contactpoints.yaml: |
    apiVersion: 1
    contactPoints:
    - orgId: 1
      name: telegram
      receivers:
      - uid: telegram-x81
        type: telegram
        settings:
          bottoken: $TELEGRAM_BOT_TOKEN
          # chat id is an identifier, not a credential (useless without the bot
          # token, which stays in the grafana-telegram secret). hardcoded because
          # grafana's env interpolation re-infers numeric strings as numbers,
          # which fails telegram settings validation
          chatid: "1661366885"
  policies.yaml: |
    apiVersion: 1
    policies:
    - orgId: 1
      receiver: telegram
      group_by: ['alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
      # daily digests (e.g. atp torrents-in-error) re-notify once a day instead
      # of every 4h while the condition holds
      - receiver: telegram
        object_matchers:
        - ['digest', '=', 'daily']
        group_by: ['alertname']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 24h
  rules.yaml: |
    apiVersion: 1
    groups:
    - orgId: 1
      name: disk
      folder: infra
      interval: 1m
      rules:
      # kubelet taints the node at ~90% root-disk usage, which evicts pods
      # (including AdGuard DNS — 2026-06-04 incident). alert at 80% so a
      # human hears about it first.
      - uid: root-disk-80
        title: root disk above 80%
        condition: C
        data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: PBFA97CFB590B2093
          model:
            expr: 100 * (1 - node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"})
            instant: true
            refId: A
        - refId: C
          relativeTimeRange:
            from: 0
            to: 0
          datasourceUid: __expr__
          model:
            type: threshold
            expression: A
            refId: C
            conditions:
            - evaluator:
                type: gt
                params: [80]
        for: 5m
        noDataState: Alerting
        execErrState: Error
        annotations:
          summary: root disk on x81k25-server is above 80% ({{ $values.A }}% used). kubelet applies a disk-pressure taint at ~90% which evicts pods including AdGuard DNS.
        labels:
          severity: warning
      # node-exporter scrape failure also fires — a dead CIFS mount or evicted
      # exporter would otherwise blind this alert silently (hence noDataState: Alerting)
    - orgId: 1
      name: atp
      folder: media
      interval: 5m
      rules:
      # daily digest of how many torrents are stuck in error_status on prod.
      # fires whenever there is at least one; the digest route (policies.yaml)
      # re-sends it once a day rather than every 4h. metric served by rear-diff
      # /metrics (atp_torrent_error_total), scraped from the media-prod pod.
      - uid: atp-torrent-errors
        title: atp torrents in error_status
        condition: C
        data:
        - refId: A
          relativeTimeRange:
            from: 600
            to: 0
          datasourceUid: PBFA97CFB590B2093
          model:
            expr: max(atp_torrent_error_total{kubernetes_namespace="media-prod"})
            instant: true
            refId: A
        - refId: C
          relativeTimeRange:
            from: 0
            to: 0
          datasourceUid: __expr__
          model:
            type: threshold
            expression: A
            refId: C
            conditions:
            - evaluator:
                type: gt
                params: [0]
        for: 0m
        noDataState: OK
        execErrState: OK
        annotations:
          summary: '{{ $values.A }} torrents are in error_status on prod (atp.torrent). break down with: SELECT error_condition, count(*) FROM atp.torrent WHERE error_status GROUP BY 1 ORDER BY 2 DESC.'
        labels:
          severity: info
          digest: daily
    - orgId: 1
      name: cron
      folder: infra
      interval: 1m
      rules:
      # host crontab jobs (user + root) are wrapped by cron-wrap.sh, which
      # writes a `cron_event=end ... status=success|failure` line per run to
      # /var/log/cron-jobs (shipped to Loki as job=cron). fire ONLY on failure;
      # the by(cronjob) grouping names the failing job in the Telegram message.
      # window 5m > eval 1m so a single failure clears after ~5m and the next
      # failure re-notifies rather than staying latched.
      - uid: cron-job-failure
        title: cron job failed
        condition: C
        data:
        - refId: A
          relativeTimeRange:
            from: 300
            to: 0
          datasourceUid: P8E80F9AEF21F6940
          model:
            datasource:
              type: loki
              uid: P8E80F9AEF21F6940
            expr: 'sum by (cronjob) (count_over_time({job="cron"} |= "cron_event=end" | logfmt | status="failure" [5m]))'
            queryType: instant
            refId: A
            intervalMs: 1000
            maxDataPoints: 43200
        - refId: C
          relativeTimeRange:
            from: 0
            to: 0
          datasourceUid: __expr__
          model:
            type: threshold
            expression: A
            refId: C
            conditions:
            - evaluator:
                type: gt
                params: [0]
        for: 0m
        noDataState: OK
        execErrState: OK
        annotations:
          summary: 'cron job "{{ $labels.cronjob }}" failed on x81k25-server (non-zero exit in the last 5m). check the Grafana "cron" dashboard or: tail /var/log/cron-jobs/{{ $labels.cronjob }}.log'
        labels:
          severity: warning
