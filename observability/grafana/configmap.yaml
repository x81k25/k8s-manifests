apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Loki
      type: loki
      # pin to the uid grafana auto-generated at first provision — existing
      # log panels (at, node-health, namespace-health) and the cron dashboard
      # + cron-job-failure alert rule reference it; do not change
      uid: P8E80F9AEF21F6940
      access: proxy
      url: http://loki.observability.svc.cluster.local:3100
      version: 1
      isDefault: true
      jsonData:
        maxLines: 1000
    - name: Prometheus
      type: prometheus
      # pin to the uid grafana auto-generated at first provision — 137 dashboard
      # panel refs and the alerting rules use it; do not change
      uid: PBFA97CFB590B2093
      access: proxy
      url: http://prometheus.observability.svc.cluster.local:9090
      version: 1
      isDefault: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: observability
data:
  grafana.ini: |
    [server]
    root_url = %(protocol)s://%(domain)s:%(http_port)s/
    serve_from_sub_path = false
    
    [security]
    
    [users]
    allow_sign_up = false
    
    [auth.anonymous]
    enabled = false
    
    [log]
    mode = console
    level = info
    
    [paths]
    data = /var/lib/grafana
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning