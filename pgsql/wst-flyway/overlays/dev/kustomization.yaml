apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

nameSuffix: -dev

patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: wst-flyway
      namespace: pgsql
    spec:
      template:
        metadata:
          labels:
            environment: dev
        spec:
          initContainers:
          - name: wst-flyway-migrate
            envFrom:
            - configMapRef:
                name: flyway-config-dev
            - secretRef:
                name: flyway-secrets-dev
            env:
            # DEV-ONLY: base/prod flyway init sets no locations, so the in-cluster
            # `flyway migrate` defaults to /flyway/sql (absent) and applies nothing.
            # Point dev at the Dockerfile COPY target so dev CI/CD truly owns apply.
            # Deliberately NOT in base: prod must stay inert (unmigrated) until the
            # OODB soak is promoted.
            - name: FLYWAY_LOCATIONS
              value: "filesystem:/flyway/migrations"
  target:
    kind: Deployment
    name: wst-flyway

images:
- name: 192.168.50.2:5050/infra/wiring-schematics
  newTag: dev


commonLabels:
  environment: dev