apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

nameSuffix: -prod

patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: wst-flyway
      namespace: pgsql
    spec:
      template:
        metadata:
          labels:
            environment: prod
        spec:
          initContainers:
          - name: wst-flyway-migrate
            envFrom:
            - configMapRef:
                name: flyway-config-prod
            - secretRef:
                name: flyway-secrets-prod
            env:
            # OODB cutover complete: prod is migrated and LOCATIONS-only, so future
            # wiring-schematics migrations apply as normal CI/CD PRs (no target gate).
            # (Pass 1 used FLYWAY_TARGET=37 to checkpoint for the dagster backfill;
            # removed after backfill so pass 2 applied V38-V44.)
            - name: FLYWAY_LOCATIONS
              value: "filesystem:/flyway/migrations"
  target:
    kind: Deployment
    name: wst-flyway

images:
- name: 192.168.50.2:5050/infra/wiring-schematics
  newTag: main


commonLabels:
  environment: prod