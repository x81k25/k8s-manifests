apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

nameSuffix: -prod

patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: wst-flyway
      namespace: pgsql
    spec:
      template:
        metadata:
          labels:
            environment: prod
        spec:
          initContainers:
          - name: wst-flyway-migrate
            envFrom:
            - configMapRef:
                name: flyway-config-prod
            - secretRef:
                name: flyway-secrets-prod
            env:
            # OODB cutover — prod was kept inert (no FLYWAY_LOCATIONS) until promotion.
            # Pass 1 stops at V37 so the dagster wst_oodb_cutover_job can backfill the
            # object graph from the still-live legacy tables BEFORE V38/V39 rename+drop.
            # After the backfill, FLYWAY_TARGET is removed (pass 2 -> V44) and prod is
            # plain LOCATIONS-only so future migrations are normal wiring-schematics PRs.
            - name: FLYWAY_LOCATIONS
              value: "filesystem:/flyway/migrations"
            - name: FLYWAY_TARGET
              value: "37"
  target:
    kind: Deployment
    name: wst-flyway

images:
- name: 192.168.50.2:5050/infra/wiring-schematics
  newTag: main


commonLabels:
  environment: prod